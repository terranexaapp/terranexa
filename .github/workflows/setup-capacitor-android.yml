name: Preparar Android Capacitor - TerraNexa

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  setup-android:
    name: Criar projeto Android com Capacitor
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código do repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependências do projeto
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Instalar Capacitor e TypeScript
        run: |
          npm install @capacitor/core @capacitor/android
          npm install -D @capacitor/cli typescript

      - name: Criar configuração do Capacitor
        run: |
          cat > capacitor.config.ts <<'EOF'
          import type { CapacitorConfig } from '@capacitor/cli';

          const config: CapacitorConfig = {
            appId: 'br.com.terranexa.app',
            appName: 'TerraNexa',
            webDir: 'dist',
            bundledWebRuntime: false
          };

          export default config;
          EOF

      - name: Gerar build web sem PWA para Android
        env:
          TERRANEXA_ANDROID_BUILD: 'true'
        run: npm run build --if-present

      - name: Criar ou sincronizar Android
        run: |
          if [ -d android ]; then
            npx cap sync android
          else
            npx cap add android
          fi

      - name: Salvar arquivos Android no repositório
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add package.json
          git add capacitor.config.ts
          git add android

          if [ -f package-lock.json ]; then
            git add package-lock.json
          fi

          if git diff --cached --quiet; then
            echo "Nenhuma alteração para salvar."
          else
            git commit -m "chore: configurar Android Capacitor do TerraNexa"
            git push
          fi
